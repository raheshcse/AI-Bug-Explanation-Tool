name: AI Bug Explanation Tool CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore backend dependencies
        run: dotnet restore BugExplainer.API/BugExplainer.API.csproj

      - name: Build backend
        run: dotnet build BugExplainer.API/BugExplainer.API.csproj --configuration Release --no-restore