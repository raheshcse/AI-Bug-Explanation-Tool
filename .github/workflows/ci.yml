name: AI Bug Explanation Tool CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore backend dependencies
        run: dotnet restore BugExplainer.API/BugExplainer.API.csproj

      - name: Build backend
        run: dotnet build BugExplainer.API/BugExplainer.API.csproj --configuration Release --no-restore

      - name: Run backend tests
        run: dotnet test BugExplainer.Tests/BugExplainer.Tests.csproj --configuration Release --no-build

      - name: Publish backend
        run: dotnet publish BugExplainer.API/BugExplainer.API.csproj --configuration Release --output ./publish/backend

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
         name: backend-artifact
         path: ./publish/backend 
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install frontend dependencies
        working-directory: bug-explainer-client
        run: npm install

      - name: Build frontend
        working-directory: bug-explainer-client
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-artifact
          path: bug-explainer-client/dist